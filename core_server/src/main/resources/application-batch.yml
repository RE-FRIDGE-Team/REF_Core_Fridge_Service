spring:
  batch:
    # ──────────────────────────────────────────────────────────────
    # [핵심] 서버 시작 시 등록된 Job 자동 실행 방지
    #
    # Spring Boot는 기본적으로 시작 시 빈으로 등록된 모든 Job을 실행합니다.
    # 스케줄러(REFReviewItemCleanupScheduler)가 Job 실행을 제어하므로
    # 자동 실행을 반드시 비활성화해야 합니다.
    #
    # ⚠️ Spring Boot 4 변경사항:
    #   'spring.batch.job.names' 프로퍼티가 제거되었습니다.
    #   자동 실행 제어는 'enabled: false'만 사용합니다.
    # ──────────────────────────────────────────────────────────────
    job:
      enabled: false

    jdbc:
      # ──────────────────────────────────────────────────────────────
      # Spring Batch 메타 테이블 자동 생성 설정
      #
      # Spring Batch는 잡 실행 이력을 저장하는 6개의 메타 테이블이 필요합니다:
      #   BATCH_JOB_INSTANCE, BATCH_JOB_EXECUTION,
      #   BATCH_JOB_EXECUTION_PARAMS, BATCH_JOB_EXECUTION_CONTEXT,
      #   BATCH_STEP_EXECUTION, BATCH_STEP_EXECUTION_CONTEXT
      #
      # always   : 서버 시작 시 매번 테이블 생성 시도 (이미 존재하면 무시)
      #            → 개발/스테이징 환경 권장
      # never    : 자동 생성 안 함. 테이블이 이미 있어야 함
      #            → 운영 환경 권장 (DBA가 DDL 직접 실행 후 never로 전환)
      # embedded : H2 같은 내장 DB 사용 시만 생성
      #
      # ⚠️ 운영 전환 시:
      #   1. always로 한 번 실행하여 테이블 생성 확인
      #   2. never로 변경
      #   또는 Flyway/Liquibase migration에 Batch DDL을 직접 추가
      # ──────────────────────────────────────────────────────────────
      initialize-schema: always

      # ──────────────────────────────────────────────────────────────
      # Spring Batch 메타 테이블 커스텀 DDL 경로 (선택사항)
      #
      # 기본 DDL 경로: classpath:org/springframework/batch/core/schema-postgresql.sql
      # PostgreSQL 사용 시 자동으로 해당 방언 DDL 사용됨.
      # 커스텀 DDL이 필요한 경우에만 명시합니다.
      #
      # schema: classpath:batch/custom-schema.sql
      # ──────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────
  # 스케줄러 설정 (REFReviewItemCleanupScheduler, REFBrandDictionaryScheduler)
  # ──────────────────────────────────────────────────────────────
  # @EnableScheduling이 활성화되어 있어야 아래 설정이 의미 있습니다.
  # Spring Boot 4에서는 기본 스레드 풀 크기가 1이므로,
  # 여러 @Scheduled 메서드가 있다면 스레드 풀을 명시적으로 늘려야
  # 스케줄 충돌(한 작업이 다음 작업의 실행을 막는 상황)을 방지할 수 있습니다.

  task:
    scheduling:
      pool:
        # 현재 @Scheduled 메서드 목록:
        #   - REFReviewItemCleanupScheduler.scheduledCleanup (매일 02:00)
        #   - REFReviewItemCleanupScheduler.checkAndCleanupIfNeeded (10분마다)
        #   - REFBrandDictionaryScheduler.flushPendingBrands (매일 03:00)
        # 3개 이상이므로 스레드 풀 크기 3 이상 설정 권장
        size: 5
      thread-name-prefix: refridge-scheduler-

  # ──────────────────────────────────────────────────────────────
  # (참고) Virtual Thread 활성화 — Spring Boot 4 + JDK 21
  # ──────────────────────────────────────────────────────────────
  # 이미 설정되어 있다면 중복 추가 불필요.
  # Virtual Thread 활성화 시 @Scheduled 스레드도 VT로 동작합니다.
  # (단, Spring Batch Job 실행 스레드도 VT가 됩니다. Batch 워크로드가
  #  CPU bound라면 일반 스레드가 유리할 수 있습니다.)
  #
  # spring:
  #   threads:
  #     virtual:
  #       enabled: true